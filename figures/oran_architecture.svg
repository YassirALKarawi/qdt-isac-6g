<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="gSMO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C3E50"/><stop offset="100%" stop-color="#1A252F"/>
    </linearGradient>
    <linearGradient id="gNRT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8E44AD"/><stop offset="100%" stop-color="#71368A"/>
    </linearGradient>
    <linearGradient id="gRT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980B9"/><stop offset="100%" stop-color="#1F6DA0"/>
    </linearGradient>
    <linearGradient id="gDU" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27AE60"/><stop offset="100%" stop-color="#1E8449"/>
    </linearGradient>
    <linearGradient id="gRU" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E67E22"/><stop offset="100%" stop-color="#CA6F1E"/>
    </linearGradient>
    <marker id="aDown" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#95a5a6"/>
    </marker>
    <marker id="aUp" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#95a5a6"/>
    </marker>
    <marker id="aPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8E44AD"/>
    </marker>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2980B9"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#2C3E50" letter-spacing="1">O-RAN Architecture Alignment</text>
  <text x="600" y="55" text-anchor="middle" font-size="11" fill="#95a5a6">Mapping of QDT-ISAC Framework Components to O-RAN Functional Entities</text>
  <line x1="150" y1="65" x2="1050" y2="65" stroke="#ecf0f1" stroke-width="1"/>

  <!-- === NON-RT RIC / SMO Layer === -->
  <g filter="url(#sh)">
    <rect x="60" y="85" width="1080" height="135" rx="10" fill="url(#gSMO)" opacity="0.95"/>
    <text x="100" y="108" font-size="13" font-weight="700" fill="#AEB6BF" letter-spacing="1">NON-RT RIC  /  SMO</text>
    <text x="1100" y="108" text-anchor="end" font-size="10" fill="#7f8c8d">Latency: > 1 s</text>
  </g>

  <!-- DT Orchestrator rApp -->
  <g filter="url(#sh)">
    <rect x="100" y="120" width="320" height="80" rx="8" fill="white" stroke="#8E44AD" stroke-width="1.5" opacity="0.95"/>
    <rect x="100" y="120" width="320" height="26" rx="8" fill="url(#gNRT)"/>
    <rect x="100" y="135" width="320" height="11" fill="url(#gNRT)"/>
    <text x="260" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="white">DT Orchestrator rApp</text>
    <text x="260" y="163" text-anchor="middle" font-size="10" fill="#7f8c8d">digital_twin.py</text>
    <text x="260" y="180" text-anchor="middle" font-size="9" fill="#95a5a6">Twin lifecycle · Sync scheduling · Confidence decay</text>
  </g>

  <!-- Trust Policy Engine rApp -->
  <g filter="url(#sh)">
    <rect x="460" y="120" width="320" height="80" rx="8" fill="white" stroke="#E74C3C" stroke-width="1.5" opacity="0.95"/>
    <rect x="460" y="120" width="320" height="26" rx="8" fill="#E74C3C"/>
    <rect x="460" y="135" width="320" height="11" fill="#E74C3C"/>
    <text x="620" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="white">Trust Policy Engine rApp</text>
    <text x="620" y="163" text-anchor="middle" font-size="10" fill="#7f8c8d">analysis.py</text>
    <text x="620" y="180" text-anchor="middle" font-size="9" fill="#95a5a6">Formal bounds · Gating thresholds · Convergence policy</text>
  </g>

  <!-- O-RAN Mapping rApp -->
  <g filter="url(#sh)">
    <rect x="820" y="120" width="280" height="80" rx="8" fill="white" stroke="#1ABC9C" stroke-width="1.5" opacity="0.95"/>
    <rect x="820" y="120" width="280" height="26" rx="8" fill="#1ABC9C"/>
    <rect x="820" y="135" width="280" height="11" fill="#1ABC9C"/>
    <text x="960" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="white">Intent Manager rApp</text>
    <text x="960" y="163" text-anchor="middle" font-size="10" fill="#7f8c8d">oran_mapping.py</text>
    <text x="960" y="180" text-anchor="middle" font-size="9" fill="#95a5a6">A1 policy enrichment · Telemetry routing</text>
  </g>

  <!-- A1 Interface Label -->
  <rect x="520" y="225" width="160" height="24" rx="12" fill="#F5E6CE" stroke="#E09100" stroke-width="1"/>
  <text x="600" y="241" text-anchor="middle" font-size="11" font-weight="600" fill="#E09100">A1 Interface (Policy)</text>

  <!-- === NEAR-RT RIC Layer === -->
  <g filter="url(#sh)">
    <rect x="60" y="260" width="1080" height="165" rx="10" fill="url(#gRT)" opacity="0.95"/>
    <text x="100" y="283" font-size="13" font-weight="700" fill="#D4E6F9" letter-spacing="1">NEAR-RT RIC</text>
    <text x="1100" y="283" text-anchor="end" font-size="10" fill="#85C1E9">Latency: 10–100 ms</text>
  </g>

  <!-- ISAC xApp -->
  <g filter="url(#sh)">
    <rect x="100" y="298" width="350" height="105" rx="8" fill="white" stroke="#2980B9" stroke-width="1.5" opacity="0.95"/>
    <rect x="100" y="298" width="350" height="26" rx="8" fill="#3498DB"/>
    <rect x="100" y="313" width="350" height="11" fill="#3498DB"/>
    <text x="275" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="white">ISAC Resource Allocation xApp</text>
    <text x="275" y="340" text-anchor="middle" font-size="10" fill="#7f8c8d">controller.py + quantum_assist.py</text>
    <text x="275" y="358" text-anchor="middle" font-size="9" fill="#95a5a6">QA candidate search · RB allocation</text>
    <text x="275" y="373" text-anchor="middle" font-size="9" fill="#95a5a6">Tx power adaptation · Sensing split</text>
    <text x="275" y="388" text-anchor="middle" font-size="9" fill="#95a5a6">7 control strategies (BL0–BL6)</text>
  </g>

  <!-- Security xApp -->
  <g filter="url(#sh)">
    <rect x="490" y="298" width="300" height="105" rx="8" fill="white" stroke="#E74C3C" stroke-width="1.5" opacity="0.95"/>
    <rect x="490" y="298" width="300" height="26" rx="8" fill="#E74C3C"/>
    <rect x="490" y="313" width="300" height="11" fill="#E74C3C"/>
    <text x="640" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="white">Security Monitoring xApp</text>
    <text x="640" y="340" text-anchor="middle" font-size="10" fill="#7f8c8d">security.py</text>
    <text x="640" y="358" text-anchor="middle" font-size="9" fill="#95a5a6">EWMA anomaly detection</text>
    <text x="640" y="373" text-anchor="middle" font-size="9" fill="#95a5a6">Bayesian trust dynamics</text>
    <text x="640" y="388" text-anchor="middle" font-size="9" fill="#95a5a6">Resource gating decisions</text>
  </g>

  <!-- Metrics xApp -->
  <g filter="url(#sh)">
    <rect x="830" y="298" width="270" height="105" rx="8" fill="white" stroke="#27AE60" stroke-width="1.5" opacity="0.95"/>
    <rect x="830" y="298" width="270" height="26" rx="8" fill="#27AE60"/>
    <rect x="830" y="313" width="270" height="11" fill="#27AE60"/>
    <text x="965" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="white">Metrics &amp; Evaluation xApp</text>
    <text x="965" y="340" text-anchor="middle" font-size="10" fill="#7f8c8d">metrics.py + plotting.py</text>
    <text x="965" y="358" text-anchor="middle" font-size="9" fill="#95a5a6">Monte Carlo aggregation</text>
    <text x="965" y="373" text-anchor="middle" font-size="9" fill="#95a5a6">95% confidence intervals</text>
    <text x="965" y="388" text-anchor="middle" font-size="9" fill="#95a5a6">Ablation study engine</text>
  </g>

  <!-- E2 Interface Label -->
  <rect x="520" y="432" width="160" height="24" rx="12" fill="#D5F5E3" stroke="#27AE60" stroke-width="1"/>
  <text x="600" y="448" text-anchor="middle" font-size="11" font-weight="600" fill="#1E8449">E2 Interface (Control)</text>

  <!-- === O-DU Layer === -->
  <g filter="url(#sh)">
    <rect x="60" y="468" width="1080" height="100" rx="10" fill="url(#gDU)" opacity="0.95"/>
    <text x="100" y="491" font-size="13" font-weight="700" fill="#D5F5E3" letter-spacing="1">O-DU  (Distributed Unit)</text>
    <text x="1100" y="491" text-anchor="end" font-size="10" fill="#ABEBC6">Latency: &lt; 1 ms</text>
  </g>

  <!-- ISAC Signal Processing -->
  <g filter="url(#sh)">
    <rect x="100" y="500" width="480" height="50" rx="8" fill="white" opacity="0.9"/>
    <text x="340" y="522" text-anchor="middle" font-size="12" font-weight="600" fill="#2C3E50">ISAC Signal Processing</text>
    <text x="340" y="538" text-anchor="middle" font-size="9" fill="#7f8c8d">communication.py + sensing.py + channel.py</text>
  </g>

  <!-- Network Entity Management -->
  <g filter="url(#sh)">
    <rect x="620" y="500" width="480" height="50" rx="8" fill="white" opacity="0.9"/>
    <text x="860" y="522" text-anchor="middle" font-size="12" font-weight="600" fill="#2C3E50">Network Entity Management</text>
    <text x="860" y="538" text-anchor="middle" font-size="9" fill="#7f8c8d">network.py · BS / UE / Target · Mobility · Energy model</text>
  </g>

  <!-- Open Fronthaul Label -->
  <rect x="500" y="575" width="200" height="24" rx="12" fill="#FDEBD0" stroke="#E67E22" stroke-width="1"/>
  <text x="600" y="591" text-anchor="middle" font-size="11" font-weight="600" fill="#CA6F1E">Open Fronthaul Interface</text>

  <!-- === O-RU Layer === -->
  <g filter="url(#sh)">
    <rect x="60" y="610" width="1080" height="60" rx="10" fill="url(#gRU)" opacity="0.95"/>
    <text x="100" y="637" font-size="13" font-weight="700" fill="#FDEBD0" letter-spacing="1">O-RU  (Radio Unit)</text>
    <text x="600" y="637" text-anchor="middle" font-size="11" fill="#FAD7A0">OFDMA Waveform  ·  64-Antenna Beamforming  ·  3.5 GHz  ·  100 MHz BW</text>
    <text x="1100" y="637" text-anchor="end" font-size="10" fill="#FAD7A0">Real-time</text>
  </g>

  <!-- Arrows between layers -->
  <!-- A1 arrows -->
  <line x1="260" y1="200" x2="260" y2="260" stroke="#E09100" stroke-width="2" marker-end="url(#aDown)" stroke-dasharray="5,3"/>
  <line x1="620" y1="200" x2="620" y2="260" stroke="#E09100" stroke-width="2" marker-end="url(#aDown)" stroke-dasharray="5,3"/>
  <line x1="960" y1="200" x2="960" y2="260" stroke="#E09100" stroke-width="2" marker-end="url(#aDown)" stroke-dasharray="5,3"/>

  <!-- E2 arrows -->
  <line x1="275" y1="403" x2="275" y2="468" stroke="#27AE60" stroke-width="2" marker-end="url(#aDown)"/>
  <line x1="640" y1="403" x2="640" y2="468" stroke="#27AE60" stroke-width="2" marker-end="url(#aDown)"/>
  <line x1="965" y1="403" x2="965" y2="468" stroke="#27AE60" stroke-width="2" marker-end="url(#aDown)"/>

  <!-- Fronthaul arrows -->
  <line x1="340" y1="550" x2="340" y2="610" stroke="#E67E22" stroke-width="2" marker-end="url(#aDown)"/>
  <line x1="860" y1="550" x2="860" y2="610" stroke="#E67E22" stroke-width="2" marker-end="url(#aDown)"/>

  <!-- Horizontal flow arrows inside Near-RT RIC -->
  <line x1="450" y1="350" x2="490" y2="350" stroke="white" stroke-width="1.5" marker-end="url(#aDown)" opacity="0.6"/>
  <line x1="790" y1="350" x2="830" y2="350" stroke="white" stroke-width="1.5" marker-end="url(#aDown)" opacity="0.6"/>

  <!-- Telemetry feedback (upward dashed) -->
  <path d="M 40 640 L 40 100 L 60 100" stroke="#F5A623" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="30" y="380" font-size="9" fill="#F5A623" font-weight="600" transform="rotate(-90,30,380)" letter-spacing="1">TELEMETRY FEEDBACK</text>

  <!-- Footer -->
  <text x="600" y="690" text-anchor="middle" font-size="9" fill="#d5d8dc">QDT-ISAC Framework  ·  O-RAN WG1 Aligned  ·  github.com/YassirALKarawi/qdt-isac-6g</text>
</svg>
