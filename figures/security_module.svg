<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E74C3C"/><stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E74C3C"/>
    </marker>
  </defs>
  <rect width="1000" height="400" fill="#FAFBFC" rx="8"/>
  <text x="500" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#2C3E50">Security Module — Anomaly Detection &amp; Trust Dynamics</text>
  <line x1="200" y1="44" x2="800" y2="44" stroke="#ecf0f1"/>

  <!-- Attack Injection -->
  <g filter="url(#sh)">
    <rect x="30" y="65" width="200" height="280" rx="10" fill="white" stroke="#C0392B" stroke-width="2"/>
    <rect x="30" y="65" width="200" height="30" rx="10" fill="url(#gR)"/>
    <rect x="30" y="82" width="200" height="13" fill="url(#gR)"/>
    <text x="130" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="white">Attack Injection</text>
    <text x="130" y="115" text-anchor="middle" font-size="10" fill="#555">Anomaly rate: 8%</text>
    <rect x="50" y="130" width="160" height="45" rx="6" fill="#FDEDEC" stroke="#E74C3C"/>
    <text x="130" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#C0392B">Jamming (60%)</text>
    <text x="130" y="166" text-anchor="middle" font-size="9" fill="#888">+15 dB interference</text>
    <rect x="50" y="185" width="160" height="45" rx="6" fill="#FDEDEC" stroke="#E74C3C"/>
    <text x="130" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#C0392B">Spoofing (40%)</text>
    <text x="130" y="221" text-anchor="middle" font-size="9" fill="#888">±80 m position offset</text>
    <text x="130" y="255" text-anchor="middle" font-size="10" fill="#555">Severity: U[0.4, 1.0]</text>
    <text x="130" y="275" text-anchor="middle" font-size="10" fill="#555">Duration: 15 slots max</text>
    <text x="130" y="295" text-anchor="middle" font-size="10" fill="#555">Targets: UE + sensing</text>
    <text x="130" y="325" text-anchor="middle" font-size="9" fill="#888">ALL baselines face</text>
    <text x="130" y="340" text-anchor="middle" font-size="9" fill="#888">same attack environment</text>
  </g>

  <!-- EWMA Detection -->
  <g filter="url(#sh)">
    <rect x="280" y="65" width="220" height="280" rx="10" fill="white" stroke="#E67E22" stroke-width="2"/>
    <rect x="280" y="65" width="220" height="30" rx="10" fill="#E67E22"/>
    <rect x="280" y="82" width="220" height="13" fill="#E67E22"/>
    <text x="390" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="white">EWMA Detection</text>
    <text x="390" y="118" text-anchor="middle" font-size="10" fill="#555">Combined anomaly score:</text>
    <rect x="300" y="128" width="180" height="50" rx="6" fill="#FEF5E7" stroke="#E67E22"/>
    <text x="390" y="148" text-anchor="middle" font-size="9" fill="#CA6F1E">score = 0.5·pos_dev</text>
    <text x="390" y="165" text-anchor="middle" font-size="9" fill="#CA6F1E">       + 0.5·sinr_dev</text>
    <text x="390" y="198" text-anchor="middle" font-size="10" fill="#555">Adaptive threshold:</text>
    <rect x="300" y="208" width="180" height="35" rx="6" fill="#FEF5E7" stroke="#E67E22"/>
    <text x="390" y="230" text-anchor="middle" font-size="9" fill="#CA6F1E">thr = max(1.5, ewma×1.5+0.3)</text>
    <text x="390" y="268" text-anchor="middle" font-size="10" fill="#555">Per-entity EWMA:</text>
    <text x="390" y="288" text-anchor="middle" font-size="9" fill="#888">α = 0.1 smoothing</text>
    <text x="390" y="308" text-anchor="middle" font-size="9" fill="#888">Twin ↔ measurement</text>
    <text x="390" y="328" text-anchor="middle" font-size="9" fill="#888">deviation comparison</text>
  </g>

  <!-- Trust Dynamics -->
  <g filter="url(#sh)">
    <rect x="550" y="65" width="200" height="280" rx="10" fill="white" stroke="#8E44AD" stroke-width="2"/>
    <rect x="550" y="65" width="200" height="30" rx="10" fill="#8E44AD"/>
    <rect x="550" y="82" width="200" height="13" fill="#8E44AD"/>
    <text x="650" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="white">Trust Dynamics</text>
    <rect x="570" y="110" width="160" height="55" rx="6" fill="#FDEDEC" stroke="#E74C3C"/>
    <text x="650" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#C0392B">Flagged (attack)</text>
    <text x="650" y="148" text-anchor="middle" font-size="9" fill="#888">τ ← τ·(1−β·excess)</text>
    <text x="650" y="162" text-anchor="middle" font-size="8" fill="#aaa">β=0.03, floor=0.05</text>
    <rect x="570" y="180" width="160" height="55" rx="6" fill="#E8F8F5" stroke="#27AE60"/>
    <text x="650" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#1E8449">Clean (no flag)</text>
    <text x="650" y="218" text-anchor="middle" font-size="9" fill="#888">τ ← τ + α·(1−τ)</text>
    <text x="650" y="232" text-anchor="middle" font-size="8" fill="#aaa">α=0.025, ceiling=1.0</text>
    <line x1="570" y1="248" x2="730" y2="248" stroke="#ecf0f1"/>
    <text x="650" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#8E44AD">Prop. 1 Bound</text>
    <text x="650" y="290" text-anchor="middle" font-size="9" fill="#888">τ_∞ ≥ α/(α+β·p_a·E[exc])</text>
    <text x="650" y="310" text-anchor="middle" font-size="9" fill="#888">Steady-state guarantee</text>
    <text x="650" y="330" text-anchor="middle" font-size="9" fill="#888">Mixing time: ~1665 slots</text>
  </g>

  <!-- Gating Output -->
  <g filter="url(#sh)">
    <rect x="800" y="65" width="170" height="280" rx="10" fill="white" stroke="#2980B9" stroke-width="2"/>
    <rect x="800" y="65" width="170" height="30" rx="10" fill="#2980B9"/>
    <rect x="800" y="82" width="170" height="13" fill="#2980B9"/>
    <text x="885" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="white">Resource Gating</text>
    <text x="885" y="120" text-anchor="middle" font-size="10" fill="#555">Trust τ > 0.5:</text>
    <text x="885" y="140" text-anchor="middle" font-size="10" fill="#27AE60" font-weight="600">Full allocation</text>
    <text x="885" y="170" text-anchor="middle" font-size="10" fill="#555">Trust τ ≤ 0.5:</text>
    <text x="885" y="190" text-anchor="middle" font-size="10" fill="#E74C3C" font-weight="600">Scaled: (0.5+τ)×base</text>
    <line x1="820" y1="210" x2="950" y2="210" stroke="#ecf0f1"/>
    <text x="885" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#2980B9">Detection Metrics</text>
    <text x="885" y="258" text-anchor="middle" font-size="9" fill="#888">Detection rate</text>
    <text x="885" y="275" text-anchor="middle" font-size="9" fill="#888">False alarm rate</text>
    <text x="885" y="292" text-anchor="middle" font-size="9" fill="#888">Avg trust score</text>
    <text x="885" y="315" text-anchor="middle" font-size="9" fill="#888">Active attack count</text>
  </g>

  <!-- Arrows -->
  <line x1="230" y1="200" x2="280" y2="200" stroke="#E74C3C" stroke-width="2" marker-end="url(#a)"/>
  <line x1="500" y1="200" x2="550" y2="200" stroke="#E74C3C" stroke-width="2" marker-end="url(#a)"/>
  <line x1="750" y1="200" x2="800" y2="200" stroke="#E74C3C" stroke-width="2" marker-end="url(#a)"/>

  <text x="500" y="385" text-anchor="middle" font-size="9" fill="#bdc3c7">security.py · Anomaly 8% · Trust decay β=0.03 · Recovery α=0.025 · EWMA smoothing 0.1 · Jamming 15 dB · Spoofing 80 m</text>
</svg>
