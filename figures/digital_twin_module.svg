<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8E44AD"/><stop offset="100%" stop-color="#6C3483"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980B9"/><stop offset="100%" stop-color="#1F6DA0"/>
    </linearGradient>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8E44AD"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2980B9"/>
    </marker>
  </defs>
  <rect width="1000" height="420" fill="#FAFBFC" rx="8"/>
  <text x="500" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#2C3E50">Imperfect Digital Twin Module</text>
  <line x1="200" y1="48" x2="800" y2="48" stroke="#ecf0f1" stroke-width="1"/>

  <!-- Physical World -->
  <g filter="url(#sh)">
    <rect x="30" y="70" width="200" height="300" rx="10" fill="white" stroke="#27AE60" stroke-width="2"/>
    <rect x="30" y="70" width="200" height="32" rx="10" fill="#27AE60"/>
    <rect x="30" y="88" width="200" height="14" fill="#27AE60"/>
    <text x="130" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="white">Physical World</text>
    <text x="130" y="125" text-anchor="middle" font-size="11" fill="#555">UE positions</text>
    <text x="130" y="145" text-anchor="middle" font-size="11" fill="#555">SINR measurements</text>
    <text x="130" y="165" text-anchor="middle" font-size="11" fill="#555">Target detections</text>
    <text x="130" y="185" text-anchor="middle" font-size="11" fill="#555">Radar SNR</text>
    <line x1="50" y1="202" x2="210" y2="202" stroke="#ecf0f1"/>
    <text x="130" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#E67E22">Telemetry Pipeline</text>
    <text x="130" y="248" text-anchor="middle" font-size="10" fill="#888">Slot t: observe</text>
    <text x="130" y="268" text-anchor="middle" font-size="10" fill="#888">Buffer → queue</text>
    <text x="130" y="288" text-anchor="middle" font-size="10" fill="#888">Delayed delivery</text>
    <rect x="55" y="310" width="150" height="40" rx="6" fill="#FEF5E7" stroke="#E67E22" stroke-width="1"/>
    <text x="130" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#E67E22">Delay = δ slots</text>
  </g>

  <!-- Twin State -->
  <g filter="url(#sh)">
    <rect x="310" y="70" width="380" height="300" rx="10" fill="white" stroke="#8E44AD" stroke-width="2"/>
    <rect x="310" y="70" width="380" height="32" rx="10" fill="url(#gP)"/>
    <rect x="310" y="88" width="380" height="14" fill="url(#gP)"/>
    <text x="500" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="white">Digital Twin State Engine</text>
    <!-- Sub-boxes -->
    <rect x="330" y="115" width="160" height="60" rx="6" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1"/>
    <text x="410" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#6C3483">Position Estimator</text>
    <text x="410" y="158" text-anchor="middle" font-size="9" fill="#888">est_pos + noise σ_p</text>

    <rect x="510" y="115" width="160" height="60" rx="6" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1"/>
    <text x="590" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#6C3483">SINR Estimator</text>
    <text x="590" y="158" text-anchor="middle" font-size="9" fill="#888">est_sinr + noise σ_s</text>

    <rect x="330" y="195" width="160" height="60" rx="6" fill="#EBF5FB" stroke="#2980B9" stroke-width="1"/>
    <text x="410" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#1F6DA0">Staleness Tracker</text>
    <text x="410" y="236" text-anchor="middle" font-size="9" fill="#888">s(t) = 1 − γ^age</text>

    <rect x="510" y="195" width="160" height="60" rx="6" fill="#EBF5FB" stroke="#2980B9" stroke-width="1"/>
    <text x="590" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#1F6DA0">Confidence Score</text>
    <text x="590" y="236" text-anchor="middle" font-size="9" fill="#888">c = f(fresh, p_acc, s_acc)</text>

    <rect x="330" y="280" width="340" height="55" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1"/>
    <text x="500" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#CA6F1E">Aggregate Twin Error</text>
    <text x="500" y="320" text-anchor="middle" font-size="9" fill="#888">ε = 0.7·pos_err/area + 0.3·sinr_err/40</text>
  </g>

  <!-- Output -->
  <g filter="url(#sh)">
    <rect x="770" y="70" width="200" height="300" rx="10" fill="white" stroke="#2980B9" stroke-width="2"/>
    <rect x="770" y="70" width="200" height="32" rx="10" fill="url(#gB)"/>
    <rect x="770" y="88" width="200" height="14" fill="url(#gB)"/>
    <text x="870" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="white">Output to Controller</text>
    <text x="870" y="130" text-anchor="middle" font-size="11" fill="#555">Per-UE state estimates</text>
    <text x="870" y="155" text-anchor="middle" font-size="11" fill="#555">Per-target state estimates</text>
    <text x="870" y="180" text-anchor="middle" font-size="11" fill="#555">Confidence scores</text>
    <text x="870" y="205" text-anchor="middle" font-size="11" fill="#555">Staleness indicators</text>
    <text x="870" y="230" text-anchor="middle" font-size="11" fill="#555">Aggregate twin error</text>
    <line x1="790" y1="250" x2="950" y2="250" stroke="#ecf0f1"/>
    <text x="870" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#2980B9">Used by:</text>
    <text x="870" y="298" text-anchor="middle" font-size="10" fill="#888">ISAC xApp (allocation)</text>
    <text x="870" y="318" text-anchor="middle" font-size="10" fill="#888">Security xApp (detection)</text>
    <text x="870" y="338" text-anchor="middle" font-size="10" fill="#888">QA module (candidates)</text>
  </g>

  <!-- Arrows -->
  <line x1="230" y1="180" x2="310" y2="180" stroke="#8E44AD" stroke-width="2" marker-end="url(#a)"/>
  <text x="270" y="172" text-anchor="middle" font-size="9" fill="#8E44AD" font-weight="600">push()</text>
  <line x1="690" y1="180" x2="770" y2="180" stroke="#2980B9" stroke-width="2" marker-end="url(#ab)"/>
  <text x="730" y="172" text-anchor="middle" font-size="9" fill="#2980B9" font-weight="600">query</text>

  <text x="500" y="405" text-anchor="middle" font-size="9" fill="#bdc3c7">digital_twin.py · Sync delay δ = 5 slots · Position noise σ = 5 m · SINR noise σ = 3 dB · State decay γ = 0.97</text>
</svg>
